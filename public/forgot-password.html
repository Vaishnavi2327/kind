<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Forgot Password • kindlink</title>
    <link rel="stylesheet" href="/assets/app.css?v=2" />
  </head>
  <body data-page="forgotPassword">
    <header class="topbar">
      <div class="container">
        <a class="brand" href="/index.html"><span class="logo"></span> kindlink</a>
        <nav class="nav" data-nav></nav>
      </div>
    </header>

    <main class="container">
      <div class="grid">
        <div class="card col-7">
          <div class="card-body">
            <h1>Forgot password</h1>
            <p>Enter your email. In real apps we send an email; in this demo the reset link can be shown on screen.</p>
            <form id="forgotForm">
              <label for="email">Email</label>
              <input id="email" type="email" required placeholder="you@email.com" />
              <div class="actions">
                <button class="btn primary" type="submit">Generate reset link</button>
                <a class="btn" href="/login.html">Back to login</a>
              </div>
            </form>
            <div id="resetResult" style="margin-top:14px"></div>
          </div>
        </div>

        <div class="card col-5">
          <div class="card-body">
            <h2>Security note</h2>
            <p>We always return “ok” even if the email doesn’t exist, to prevent user enumeration.</p>
          </div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <footer class="footer">kindlink • built for community trust</footer>
    <script src="/assets/app.js?v=2"></script>
  </body>
</html>
