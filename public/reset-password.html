<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reset Password • kindlink</title>
    <link rel="stylesheet" href="/assets/app.css?v=2" />
  </head>
  <body data-page="resetPassword">
    <header class="topbar">
      <div class="container">
        <a class="brand" href="/index.html"><span class="logo"></span> kindlink</a>
        <nav class="nav" data-nav></nav>
      </div>
    </header>

    <main class="container">
      <div class="grid">
        <div class="card col-7">
          <div class="card-body">
            <h1>Reset password</h1>
            <p>Set a new password for your account.</p>
            <form id="resetForm">
              <label for="token">Reset token</label>
              <input id="token" required placeholder="Token from reset link" />
              <label for="newPassword">New password</label>
              <input id="newPassword" type="password" required placeholder="Minimum 6 characters" />
              <div class="actions">
                <button class="btn primary" type="submit">Reset password</button>
                <a class="btn" href="/login.html">Login</a>
              </div>
            </form>
          </div>
        </div>

        <div class="card col-5">
          <div class="card-body">
            <h2>Tip</h2>
            <p>If you came from a reset link, the token will auto-fill.</p>
          </div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <footer class="footer">kindlink • built for community trust</footer>
    <script src="/assets/app.js?v=2"></script>
  </body>
</html>
